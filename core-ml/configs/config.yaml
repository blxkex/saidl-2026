model:
  context_len: 1024
  embed_dim: 256
  n_heads: 8
  n_layers: 6
  dropout: 0.1

  # baseline | hybrid | alternating
  mode: "baseline"
  # learned absolute PE on the input embeddings.
  # keep true for "mha"; set false when flexible attention already injects RoPE/ALiBi/RPE.
  use_abs_pe: false

  attention:
    # mha = MaskedMultiHeadedAttention (absolute PE).
    # flexible = FlexibleAttentionBlock (pe + variant below).
    type: "flexible"
    pe: "RoPE"        # RoPE | ALiBi | RPE   (flexible only)
    variant: "GQA"    # SWA  | MQA   | GQA   (flexible only)
    window_size: 128  # SWA only
    max_distance: 128 # RPE only
    groups: 2         # GQA only

  conv:               # used by hybrid / alternating modes
    kernel_size: 3
    padding: 1

training:
  lr: 3e-4
  batch_size: 4
  grad_accum_steps: 4
  epochs: 15
  device: "cuda"

wandb:
  enabled: true        # set true (or override wandb.enabled=true) to log to W&B
  project: "saidl-transformer"
  entity: "bhuvaneshreddy-bits-pilani"          # your wandb username/team; null = default
  name: null            # run name; null = wandb auto-generates
  mode: "online"        # online | offline | disabled

data:
  dataset_path: "wikitext"
  dataset_name: "wikitext-2-raw-v1"